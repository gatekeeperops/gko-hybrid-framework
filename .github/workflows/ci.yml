# PURPOSE: GitHub Actions CI pipeline.
# WHY: Runs all tests automatically on every push and PR.
# This is the core retainer value — clients get automated
# quality gates on every release without manual intervention.
# Secrets are stored in GitHub repo settings, never in code.

name: GKO Hybrid Framework CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 6am UTC — production monitoring
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ── API Tests ────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        - name: Debug env vars
        run: |
          echo "TEST_USERNAME length: ${#TEST_USERNAME}"
          echo "TEST_PASSWORD length: ${#TEST_PASSWORD}"
          echo "AUTH_TYPE: $AUTH_TYPE"
          echo "API_BASE_URL: $API_BASE_URL"
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          AUTH_TYPE: bearer
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          CLIENT_NAME: toolshop
          ENV_NAME: staging
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          AUTH_TYPE: bearer
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: true
          TIMEOUT: 30000
          CI: true

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            playwright-report/
            allure-results/
          retention-days: 30

  # ── UI Tests ─────────────────────────────────────────────
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npx playwright test --project=ui
        env:
          CLIENT_NAME: toolshop
          ENV_NAME: staging
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          AUTH_TYPE: bearer
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: true
          TIMEOUT: 30000
          CI: true

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 30

  # ── Hybrid Tests ─────────────────────────────────────────
  hybrid-tests:
    name: Hybrid Tests
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Hybrid tests
        run: npx playwright test --project=hybrid
        env:
          CLIENT_NAME: toolshop
          ENV_NAME: staging
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          AUTH_TYPE: bearer
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: true
          TIMEOUT: 30000
          CI: true

      - name: Upload Hybrid test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hybrid-test-results
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 30

  # ── Allure Report ─────────────────────────────────────────
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, hybrid-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Merge allure results
        run: |
          mkdir -p allure-results
          find all-results -name "*.json" -o -name "*.xml" | \
          xargs -I {} cp {} allure-results/ 2>/dev/null || true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report